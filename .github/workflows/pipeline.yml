name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run backend tests
        run: npm test
        working-directory: ./backend

      - name: Build Docker image
        run: docker build -t the-pipe:${{ github.sha }} .

      - name: Run container for health check
        run: |
          docker run -d -p 3001:3001 --name app the-pipe:${{ github.sha }}
          sleep 10
          curl -f http://localhost:3001/health

      - name: Stop test container
        if: always()
        run: docker stop app || true && docker rm app || true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: the-pipe:${{ github.sha }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Deployment note
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "Render handles deployment automatically after CI passes."
